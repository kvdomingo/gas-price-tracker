version: "3"

tasks:
  default:
    cmd:
      task: up

  setup:
    desc: Setup the project
    cmds:
      - prek install
      - uv sync --dev
      - cd dbt && uv run dbt deps && cd ..

  up:
    desc: Build and start containers
    interactive: true
    cmd: infisical run -- docker compose up --build --remove-orphans

  stop:
    desc: Stop containers
    cmd: docker compose stop

  logs:
    desc: Follow logs
    interactive: true
    cmd: docker compose logs --follow {{ .CLI_ARGS }}

  restart:
    desc: Restart containers
    cmd: docker compose restart {{ .CLI_ARGS }}

  down:
    desc: Stop and remove containers
    cmd: docker compose down {{ .CLI_ARGS }}

  clean:
    desc: Nuke everything
    cmd: docker compose down --volumes --remove-orphans {{ .CLI_ARGS }}

  exec:
    desc: Execute a command in a running container
    cmd: docker compose exec {{ .CLI_ARGS }}

  pgcli:
    desc: Attach to the db container and run pgcli
    interactive: true
    cmd: pgcli
      postgresql://gas_price_tracker:gas_price_tracker@db:5432/gas_price_tracker
